<header class="header-shell">
  <section class="header-hero">

    <div class="hero-main">
      <section class="brand-block">
        <div class="brand-copy">
          <p class="brand-kicker">BTG Fondos</p>
          <h1 class="brand-title">{{ t('header.brand.title') }}</h1>
          <p class="brand-subtitle">
            <span [matTooltip]="t('header.fpv.tooltip')">FPV</span>
            /
            <span [matTooltip]="t('header.fic.tooltip')">FIC</span>
            {{ t('header.brand.subtitle') }}
          </p>
        </div>
      </section>

      <div class="theme-toggle-row">
        <button
          mat-icon-button
          type="button"
          class="theme-toggle"
          [matTooltip]="themeTooltip"
          (click)="toggleTheme()"
          [attr.aria-label]="themeTooltip">
          <mat-icon>{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        <div class="lang-switch" [attr.aria-label]="t('header.language.aria')">
          <button
            mat-button
            type="button"
            [class.lang-switch__btn--active]="language === 'es'"
            (click)="setLanguage('es')">
            {{ t('header.language.es') }}
          </button>
          <button
            mat-button
            type="button"
            [class.lang-switch__btn--active]="language === 'en'"
            (click)="setLanguage('en')">
            {{ t('header.language.en') }}
          </button>
        </div>
      </div>

      <section class="account-card">
        <div class="account-head">
          <p class="account-label">{{ t('header.client') }}</p>
          <p class="account-name">{{ usuario$ | async }}</p>
        </div>
        <div class="saldo-pill">
          <small>{{ t('header.balance') }}</small>
          <strong>{{ saldo$ | async | currency: 'COP $' : 'symbol' : '1.0-0' }}</strong>
        </div>
      </section>
    </div>

    <nav class="header-nav" [attr.aria-label]="t('header.nav.context')">
        @for (item of navItems; track $index) {
            <a
              class="nav-item"
              [routerLink]="item.route"
              routerLinkActive="nav-item--active"
              [routerLinkActiveOptions]="{ exact: true }">
              {{ t(item.labelKey) }}
            </a>
        }
    </nav>
  </section>
</header>
